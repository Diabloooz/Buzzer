<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Market Rates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f0f0;
      --card:    #ffffff;
      --border:  #e2e2e2;
      --divider: #f4f4f4;
      --text:    #0a0a0a;
      --sub:     #555555;   /* was #999 — now legible */
      --red:     #cc2222;
      --green:   #1a8a4a;
      --blue:    #0066cc;
      --hdr:     #fafafa;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 12px 18px;
    }

    /* ─── Page header ─── */
    .page-hdr { text-align: center; margin-bottom: 12px; }

    h1 {
      font-size: clamp(13px, 3vw, 19px);
      letter-spacing: 7px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
      font-family: 'Courier New', monospace;
    }

    #ts {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--sub);
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    /* ─── Cards grid ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      width: 100%;
      max-width: 720px;
    }

    @media (min-width: 560px) {
      .grid { grid-template-columns: 1fr 1fr; }
      /* BTC is the 5th (odd) card — span full width */
      .card:last-child:nth-child(odd) { grid-column: 1 / -1; }
    }

    /* ─── Card ─── */
    .card {
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .card-hdr {
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
      padding: 7px 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .card-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    .card-unit {
      font-size: 11px;      /* ↑ was 9px */
      color: var(--sub);    /* now #555 */
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    /* ─── Rate row ─── */
    .rrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 13px;
      min-height: 48px;
      gap: 8px;
    }

    .rrow + .rrow { border-top: 1px solid var(--divider); }

    /* left: price + arrow */
    .rrow-left {
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-shrink: 0;
    }

    .rrow-price {
      font-size: clamp(19px, 4.2vw, 25px);
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1;
      font-family: 'Courier New', monospace;
      color: var(--text);
    }

    .rrow-price.ld {
      font-size: 14px;
      color: #ccc;
      font-weight: 400;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .rrow-price.er {
      font-size: 10px;
      color: var(--red);
      font-weight: 400;
      letter-spacing: 1px;
    }

    .rrow-price.stale { color: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1; }
    }

    .rrow-arrow { font-size: 15px; font-weight: 900; line-height: 1; }
    .rrow-arrow.up   { color: var(--green); }
    .rrow-arrow.down { color: var(--red); }

    /* right: source + time + stale */
    .rrow-right {
      text-align: right;
      flex-shrink: 0;
      max-width: 54%;
    }

    .rrow-src {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: var(--blue);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rrow-src:hover { text-decoration: underline; }

    .rrow-note {
      font-size: 11px;      /* ↑ was 9px */
      color: var(--sub);    /* now #555 */
      margin-left: 3px;
      font-style: italic;
    }

    .rrow-time {
      display: block;
      font-size: 11px;      /* ↑ was 9px */
      color: var(--sub);    /* now #555 */
      margin-top: 2px;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
    }

    .rrow-stale {
      display: block;
      font-size: 9px;
      color: var(--red);
      margin-top: 1px;
      font-family: 'Courier New', monospace;
    }

    /* ─── Footer ─── */
    .foot { margin-top: 10px; }

    #rbtn {
      padding: 8px 28px;
      background: #0a0a0a;
      border: none;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #rbtn:hover:not(:disabled) { opacity: 0.7; }
    #rbtn:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>

<div class="page-hdr">
  <h1>Live Market Rates</h1>
  <p id="ts">Loading…</p>
</div>

<div class="grid" id="grid"></div>

<div class="foot">
  <button id="rbtn">↻ Refresh</button>
</div>

<script>
'use strict';

// ── Asset definitions ─────────────────────────────────────────────────────────
const ASSETS = [
  {
    id: 'usd', name: 'USD / EGP', unit: 'EGP per 1 USD', dec: 4,
    rows: [
      { key: 'floatrates', src: 'FloatRates',            href: 'https://www.floatrates.com' },
      { key: 'openex',     src: 'Open Exchange Rates',   href: 'https://open.er-api.com' },
    ]
  },
  {
    id: 'sar', name: 'SAR / EGP', unit: 'EGP per 1 SAR', dec: 4,
    rows: [
      { key: 'floatrates', src: 'FloatRates',            href: 'https://www.floatrates.com' },
      { key: 'openex',     src: 'Open Exchange Rates',   href: 'https://open.er-api.com' },
    ]
  },
  {
    id: 'gold', name: 'Gold', unit: 'USD / troy oz', dec: 2,
    rows: [
      { key: 'coinbase', src: 'Coinbase XAU',        href: 'https://coinbase.com' },
      { key: 'yahoo',    src: 'Yahoo · Gold (GC=F)', href: 'https://finance.yahoo.com' },
    ]
  },
  {
    id: 'crude', name: 'Crude Oil', unit: 'USD / barrel', dec: 2,
    rows: [
      { key: 'brent', src: 'Yahoo · Brent (BZ=F)', href: 'https://finance.yahoo.com' },
      { key: 'wti',   src: 'Yahoo · WTI (CL=F)',   href: 'https://finance.yahoo.com', note: 'diff. grade' },
    ]
  },
  {
    id: 'btc', name: 'Bitcoin', unit: 'USD per BTC', dec: 0,
    rows: [
      { key: 'coinbase', src: 'Coinbase BTC',    href: 'https://coinbase.com' },
      { key: 'yahoo',    src: 'Yahoo · BTC-USD', href: 'https://finance.yahoo.com' },
    ]
  },
];

// ── Build DOM ─────────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');

ASSETS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    `<div class="card-hdr">
       <span class="card-name">${a.name}</span>
       <span class="card-unit">${a.unit}</span>
     </div>` +
    a.rows.map(r =>
      `<div class="rrow">
         <div class="rrow-left">
           <span class="rrow-price ld" id="p-${a.id}-${r.key}">···</span>
           <span class="rrow-arrow"    id="arr-${a.id}-${r.key}"></span>
         </div>
         <div class="rrow-right">
           <a class="rrow-src" href="${r.href}" target="_blank" rel="noopener">${r.src}</a>
           ${r.note ? `<span class="rrow-note">${r.note}</span>` : ''}
           <span class="rrow-time"  id="t-${a.id}-${r.key}">—</span>
           <span class="rrow-stale" id="stale-${a.id}-${r.key}"></span>
         </div>
       </div>`
    ).join('');
  grid.appendChild(card);
});

// ── DOM helpers ───────────────────────────────────────────────────────────────
function fmtTime(date) {
  // Fixed GMT+3 (Asia/Riyadh has no DST, always UTC+3)
  return date.toLocaleTimeString('en-US', {
    timeZone: 'Asia/Riyadh',
    hour12: false, hour: '2-digit', minute: '2-digit',
  }) + ' GMT+3';
}

function setP(aid, key, val, dec) {
  const el = document.getElementById(`p-${aid}-${key}`);
  el.className = 'rrow-price';
  el.textContent = Number(val).toLocaleString('en-US', {
    minimumFractionDigits: dec, maximumFractionDigits: dec,
  });
}

function setT(aid, key, ts, checkStale = false) {
  const tEl  = document.getElementById(`t-${aid}-${key}`);
  const stEl = document.getElementById(`stale-${aid}-${key}`);
  const pEl  = document.getElementById(`p-${aid}-${key}`);
  tEl.textContent = fmtTime(ts);
  if (checkStale) {
    const ageH = (Date.now() - ts.getTime()) / 3_600_000;
    if (ageH >= 1) {
      pEl.classList.add('stale');
      stEl.textContent = `displayed rate is ${Math.round(ageH)}h late`;
    } else {
      stEl.textContent = '';
    }
  }
}

function setArrow(aid, key, pct) {
  const el = document.getElementById(`arr-${aid}-${key}`);
  if (!el || pct === null || pct === undefined || isNaN(pct)) return;
  const abs = Math.abs(pct);
  if (abs < 0.001) { el.textContent = ''; el.className = 'rrow-arrow'; return; }
  const up  = pct > 0;
  const big = abs >= 2;
  el.textContent = big ? (up ? '▲▲' : '▼▼') : (up ? '▲' : '▼');
  el.className   = 'rrow-arrow ' + (up ? 'up' : 'down');
}

function setLd(aid, key) {
  const pEl = document.getElementById(`p-${aid}-${key}`);
  pEl.className = 'rrow-price ld'; pEl.textContent = '···';
  document.getElementById(`t-${aid}-${key}`).textContent = '—';
  const arrEl = document.getElementById(`arr-${aid}-${key}`);
  if (arrEl) { arrEl.textContent = ''; arrEl.className = 'rrow-arrow'; }
  const stEl = document.getElementById(`stale-${aid}-${key}`);
  if (stEl) stEl.textContent = '';
}

function setEr(aid, key, msg) {
  const el = document.getElementById(`p-${aid}-${key}`);
  el.className = 'rrow-price er'; el.textContent = msg || 'N/A';
  document.getElementById(`t-${aid}-${key}`).textContent = '—';
}

// ── Fetchers ──────────────────────────────────────────────────────────────────

// FloatRates — independent hourly FX source, no API key required
async function fetchFloatRates() {
  const base  = 'https://www.floatrates.com/daily/usd.json';
  const proxy = 'https://corsproxy.io/?' + encodeURIComponent(base);
  for (const url of [base, proxy]) {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      const d      = await r.json();
      const egp    = parseFloat(d?.egp?.rate);
      const sar    = parseFloat(d?.sar?.rate);
      if (!egp || !sar) throw new Error('missing');
      const ts     = d.egp?.date ? new Date(d.egp.date) : new Date();
      const sarEgp = egp / sar;
      setP('usd', 'floatrates', egp,    4); setT('usd', 'floatrates', ts);
      setP('sar', 'floatrates', sarEgp, 4); setT('sar', 'floatrates', ts);
      return { egp, sarEgp };
    } catch { /* try next */ }
  }
  throw new Error('unavailable');
}

// Open Exchange Rates — free, no auth, replaces Yahoo FX
async function fetchOpenER() {
  const r = await fetch('https://open.er-api.com/v6/latest/USD', {
    signal: AbortSignal.timeout(12000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d      = await r.json();
  const egp    = parseFloat(d.rates?.EGP);
  const sar    = parseFloat(d.rates?.SAR);
  if (!egp || !sar) throw new Error('missing rates');
  const sarEgp = egp / sar;
  const ts     = new Date(d.time_last_update_unix * 1000);
  setP('usd', 'openex', egp,    4); setT('usd', 'openex', ts);
  setP('sar', 'openex', sarEgp, 4); setT('sar', 'openex', ts);
  return { egp, sarEgp };
}

// Arrow from localStorage — compare current vs previous fetch (works for all assets)
function lsArrow(storageKey, currentVal) {
  const prev = parseFloat(localStorage.getItem(storageKey) || '0');
  localStorage.setItem(storageKey, String(currentVal));
  if (!prev || isNaN(prev) || prev === currentVal) return null;
  return ((currentVal - prev) / prev) * 100;
}

// Coinbase spot price — returns price for arrow computation
async function fetchCoinbase(symbol, aid, key, dec) {
  const r = await fetch(`https://api.coinbase.com/v2/prices/${symbol}/spot`, {
    signal: AbortSignal.timeout(10000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  const p = parseFloat(d?.data?.amount);
  if (!p || isNaN(p)) throw new Error('parse error');
  setP(aid, key, p, dec);
  setT(aid, key, new Date());
  return p;
}

// Yahoo Finance — returns regularMarketChangePercent for arrow
async function fetchYahoo(symbol, aid, key, dec) {
  const enc   = encodeURIComponent(symbol);
  const base  = `https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1m&range=1d`;
  const proxy = 'https://corsproxy.io/?' + encodeURIComponent(base);
  for (const url of [base, proxy]) {
    try {
      const r    = await fetch(url, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      const d    = await r.json();
      const meta = d?.chart?.result?.[0]?.meta;
      const p    = meta?.regularMarketPrice;
      const pct  = meta?.regularMarketChangePercent ?? null;
      const ts   = meta?.regularMarketTime
        ? new Date(meta.regularMarketTime * 1000)
        : new Date();
      if (typeof p === 'number' && p > 0) {
        setP(aid, key, p, dec);
        setT(aid, key, ts, true);
        return { p, pct };
      }
    } catch { /* try next */ }
  }
  throw new Error('unavailable');
}

// ── Main refresh ──────────────────────────────────────────────────────────────
async function refresh() {
  const btn = document.getElementById('rbtn');
  btn.disabled = true;
  ASSETS.forEach(a => a.rows.forEach(r => setLd(a.id, r.key)));
  document.getElementById('ts').textContent = 'Fetching…';

  const [frR, oerR, cbXauR, goldYR, brR, wtiR, cbBtcR, btcYR] =
    await Promise.allSettled([
      fetchFloatRates(),
      fetchOpenER(),
      fetchCoinbase('XAU-USD', 'gold', 'coinbase', 2),
      fetchYahoo('GC=F',     'gold',  'yahoo',   2),
      fetchYahoo('BZ=F',     'crude', 'brent',   2),
      fetchYahoo('CL=F',     'crude', 'wti',     2),
      fetchCoinbase('BTC-USD', 'btc', 'coinbase', 0),
      fetchYahoo('BTC-USD',  'btc',   'yahoo',   0),
    ]);

  // ── Error states ────────────────────────────────────────────────────────────
  if (frR.status    === 'rejected') { setEr('usd', 'floatrates', 'Unavailable'); setEr('sar', 'floatrates', 'Unavailable'); }
  if (oerR.status   === 'rejected') { setEr('usd', 'openex',     'Unavailable'); setEr('sar', 'openex',     'Unavailable'); }
  if (cbXauR.status === 'rejected') setEr('gold',  'coinbase', 'Unavailable');
  if (goldYR.status === 'rejected') setEr('gold',  'yahoo',    'Unavailable');
  if (brR.status    === 'rejected') setEr('crude', 'brent',    'Unavailable');
  if (wtiR.status   === 'rejected') setEr('crude', 'wti',      'Unavailable');
  if (cbBtcR.status === 'rejected') setEr('btc',   'coinbase', 'Unavailable');
  if (btcYR.status  === 'rejected') setEr('btc',   'yahoo',    'Unavailable');

  // ── Arrows: all assets use localStorage (current vs previous fetch) ──────────
  // FX — single rate drives both rows
  const usdVal = (frR.status  === 'fulfilled' ? frR.value?.egp    : null)
              ?? (oerR.status === 'fulfilled' ? oerR.value?.egp   : null);
  const sarVal = (frR.status  === 'fulfilled' ? frR.value?.sarEgp : null)
              ?? (oerR.status === 'fulfilled' ? oerR.value?.sarEgp : null);
  if (usdVal) { const p = lsArrow('bz_usd', usdVal);    setArrow('usd', 'floatrates', p); setArrow('usd', 'openex', p); }
  if (sarVal) { const p = lsArrow('bz_sar', sarVal);    setArrow('sar', 'floatrates', p); setArrow('sar', 'openex', p); }

  // Gold — pick best available price; apply to both rows
  const goldPrice = (goldYR.status  === 'fulfilled' ? goldYR.value?.p  : null)
                 ?? (cbXauR.status  === 'fulfilled' ? cbXauR.value     : null);
  if (goldPrice) { const p = lsArrow('bz_gold', goldPrice); setArrow('gold', 'coinbase', p); setArrow('gold', 'yahoo', p); }

  // Crude — each source tracked independently
  if (brR.status  === 'fulfilled' && brR.value?.p  != null) setArrow('crude', 'brent', lsArrow('bz_brent', brR.value.p));
  if (wtiR.status === 'fulfilled' && wtiR.value?.p != null) setArrow('crude', 'wti',   lsArrow('bz_wti',   wtiR.value.p));

  // BTC — pick best available price; apply to both rows
  const btcPrice = (btcYR.status  === 'fulfilled' ? btcYR.value?.p  : null)
                ?? (cbBtcR.status === 'fulfilled' ? cbBtcR.value    : null);
  if (btcPrice) { const p = lsArrow('bz_btc', btcPrice); setArrow('btc', 'coinbase', p); setArrow('btc', 'yahoo', p); }

  // ── Header timestamp (GMT+3) ────────────────────────────────────────────────
  const now = new Date();
  document.getElementById('ts').textContent =
    'Updated ' + now.toLocaleString('en-US', {
      timeZone: 'Asia/Riyadh',
      day: '2-digit', month: 'short',
      hour: '2-digit', minute: '2-digit', hour12: false,
    }) + ' GMT+3';

  btn.disabled = false;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('rbtn').addEventListener('click', refresh);
refresh();
</script>

</body>
</html>
