<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Market Rates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f0f0;
      --card:    #ffffff;
      --border:  #e2e2e2;
      --divider: #f4f4f4;
      --text:    #0a0a0a;
      --sub:     #999999;
      --red:     #cc2222;
      --blue:    #0066cc;
      --hdr:     #fafafa;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 28px;
    }

    /* ─── Page header ─── */
    .page-hdr {
      text-align: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(15px, 3.5vw, 22px);
      letter-spacing: 7px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 5px;
      font-family: 'Courier New', monospace;
    }

    #ts {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--sub);
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    /* ─── Cards grid ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
      max-width: 700px;
    }

    @media (min-width: 560px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    /* ─── Card ─── */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .card-hdr {
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
      padding: 9px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .card-name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    .card-unit {
      font-size: 9px;
      color: var(--sub);
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    /* ─── Rate row ─── */
    .rrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      min-height: 56px;
      gap: 8px;
    }

    .rrow + .rrow { border-top: 1px solid var(--divider); }

    .rrow-price {
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1;
      font-family: 'Courier New', monospace;
      flex-shrink: 0;
      color: var(--text);
    }

    .rrow-price.ld {
      font-size: 16px;
      color: #cccccc;
      font-weight: 400;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .rrow-price.er {
      font-size: 10px;
      color: var(--red);
      font-weight: 400;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1; }
    }

    .rrow-right {
      text-align: right;
      flex-shrink: 0;
      max-width: 55%;
    }

    .rrow-src {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: var(--blue);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rrow-src:hover { text-decoration: underline; }

    .rrow-note {
      font-size: 9px;
      color: var(--sub);
      margin-left: 3px;
      font-style: italic;
    }

    .rrow-time {
      display: block;
      font-size: 9px;
      color: var(--sub);
      margin-top: 3px;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
    }

    /* ─── Footer ─── */
    .foot {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    #rbtn {
      padding: 8px 28px;
      background: #0a0a0a;
      border: none;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #rbtn:hover:not(:disabled) { opacity: 0.7; }
    #rbtn:disabled { opacity: 0.3; cursor: default; }

    #cd {
      font-size: 10px;
      color: var(--sub);
      letter-spacing: 1px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

<div class="page-hdr">
  <h1>Live Market Rates</h1>
  <p id="ts">Loading…</p>
</div>

<div class="grid" id="grid"></div>

<div class="foot">
  <button id="rbtn">↻ Refresh</button>
  <span id="cd"></span>
</div>

<script>
'use strict';

// ── Asset definitions ─────────────────────────────────────────────────────────
const ASSETS = [
  {
    id: 'usd', name: 'USD / EGP', unit: 'EGP per 1 USD', dec: 2,
    rows: [
      { key: 'era',   src: 'ExchangeRate-API', href: 'https://open.er-api.com' },
      { key: 'fawaz', src: 'Currency API · CDN', href: 'https://currency-api.pages.dev' },
    ]
  },
  {
    id: 'sar', name: 'SAR / EGP', unit: 'EGP per 1 SAR', dec: 4,
    rows: [
      { key: 'era',   src: 'ExchangeRate-API', href: 'https://open.er-api.com' },
      { key: 'fawaz', src: 'Currency API · CDN', href: 'https://currency-api.pages.dev' },
    ]
  },
  {
    id: 'gold', name: 'Gold', unit: 'USD / troy oz', dec: 2,
    rows: [
      { key: 'metals',   src: 'metals.live',  href: 'https://metals.live' },
      { key: 'coinbase', src: 'Coinbase XAU', href: 'https://coinbase.com' },
    ]
  },
  {
    id: 'crude', name: 'Crude Oil', unit: 'USD / barrel', dec: 2,
    rows: [
      { key: 'brent', src: 'Yahoo · Brent (BZ=F)', href: 'https://finance.yahoo.com' },
      { key: 'wti',   src: 'Yahoo · WTI (CL=F)',   href: 'https://finance.yahoo.com', note: 'diff. grade' },
    ]
  },
];

// ── Build DOM ─────────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');

ASSETS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    `<div class="card-hdr">
       <span class="card-name">${a.name}</span>
       <span class="card-unit">${a.unit}</span>
     </div>` +
    a.rows.map(r =>
      `<div class="rrow">
         <div class="rrow-price ld" id="p-${a.id}-${r.key}">···</div>
         <div class="rrow-right">
           <a class="rrow-src" href="${r.href}" target="_blank" rel="noopener">${r.src}</a>
           ${r.note ? `<span class="rrow-note">${r.note}</span>` : ''}
           <span class="rrow-time" id="t-${a.id}-${r.key}">—</span>
         </div>
       </div>`
    ).join('');
  grid.appendChild(card);
});

// ── DOM helpers ───────────────────────────────────────────────────────────────
function setP(aid, key, val, dec) {
  const el = document.getElementById(`p-${aid}-${key}`);
  el.className = 'rrow-price';
  el.textContent = val.toLocaleString('en-US', {
    minimumFractionDigits: dec, maximumFractionDigits: dec,
  });
}

function setT(aid, key, ts) {
  const el = document.getElementById(`t-${aid}-${key}`);
  if (ts instanceof Date) {
    el.textContent = ts.toLocaleTimeString('en-US', {
      hour12: false, hour: '2-digit', minute: '2-digit',
    });
  } else {
    el.textContent = String(ts);  // date-only string
  }
}

function setLd(aid, key) {
  const el = document.getElementById(`p-${aid}-${key}`);
  el.className = 'rrow-price ld'; el.textContent = '···';
  document.getElementById(`t-${aid}-${key}`).textContent = '—';
}

function setEr(aid, key, msg) {
  const el = document.getElementById(`p-${aid}-${key}`);
  el.className = 'rrow-price er'; el.textContent = msg || 'N/A';
  document.getElementById(`t-${aid}-${key}`).textContent = '—';
}

// ── Fetchers ──────────────────────────────────────────────────────────────────

// open.er-api.com  →  USD/EGP  &  SAR/EGP
async function fetchERA() {
  const r = await fetch('https://open.er-api.com/v6/latest/USD', {
    signal: AbortSignal.timeout(12000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.result !== 'success') throw new Error('error');
  const ts  = new Date(d.time_last_update_utc);
  const egp = d.rates.EGP, sar = d.rates.SAR;
  if (!egp || !sar) throw new Error('missing rates');
  setP('usd', 'era', egp,       2); setT('usd', 'era', ts);
  setP('sar', 'era', egp / sar, 4); setT('sar', 'era', ts);
}

// currency-api.pages.dev  →  USD/EGP  &  SAR/EGP
async function fetchFawaz() {
  const r = await fetch('https://currency-api.pages.dev/v1/currencies/usd.min.json', {
    signal: AbortSignal.timeout(12000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  const egp = d.usd?.egp, sar = d.usd?.sar;
  if (!egp || !sar) throw new Error('missing rates');
  const ts = d.date || '—';   // API returns "YYYY-MM-DD" only
  setP('usd', 'fawaz', egp,       2); setT('usd', 'fawaz', ts);
  setP('sar', 'fawaz', egp / sar, 4); setT('sar', 'fawaz', ts);
}

// metals.live  →  Gold spot
async function fetchMetals() {
  const r = await fetch('https://api.metals.live/v1/spot', {
    signal: AbortSignal.timeout(10000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  let p = null;
  if (Array.isArray(d)) {
    const o = d.find(x => 'gold' in x || 'XAU' in x);
    p = o?.gold ?? o?.XAU ?? null;
  } else if (d && typeof d === 'object') {
    p = d.gold ?? d.XAU ?? null;
  }
  if (typeof p !== 'number' || p <= 0) throw new Error('parse error');
  setP('gold', 'metals', p, 2); setT('gold', 'metals', new Date());
}

// Coinbase  →  Gold spot (XAU-USD)
async function fetchCoinbase() {
  const r = await fetch('https://api.coinbase.com/v2/prices/XAU-USD/spot', {
    signal: AbortSignal.timeout(10000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  const p = parseFloat(d?.data?.amount);
  if (!p || isNaN(p)) throw new Error('parse error');
  setP('gold', 'coinbase', p, 2); setT('gold', 'coinbase', new Date());
}

// Yahoo Finance  →  Brent (BZ=F) or WTI (CL=F)
async function fetchYahoo(symbol, aid, key) {
  const enc   = encodeURIComponent(symbol);
  const base  = `https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1m&range=1d`;
  const proxy = 'https://corsproxy.io/?' + encodeURIComponent(base);
  for (const url of [base, proxy]) {
    try {
      const r    = await fetch(url, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      const d    = await r.json();
      const meta = d?.chart?.result?.[0]?.meta;
      const p    = meta?.regularMarketPrice;
      const ts   = meta?.regularMarketTime
        ? new Date(meta.regularMarketTime * 1000)
        : new Date();
      if (typeof p === 'number' && p > 0) {
        setP(aid, key, p, 2); setT(aid, key, ts); return;
      }
    } catch { /* try next */ }
  }
  throw new Error('unavailable');
}

// ── Countdown timer ───────────────────────────────────────────────────────────
const IV = 5 * 60 * 1000;
let autoTimer, cdTimer, nextAt;

function startCd() {
  nextAt = Date.now() + IV;
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    const rem = Math.max(0, nextAt - Date.now());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    document.getElementById('cd').textContent =
      `Auto-refresh in ${m}:${String(s).padStart(2, '0')}`;
  }, 1000);
}

// ── Main refresh ──────────────────────────────────────────────────────────────
async function refresh() {
  const btn = document.getElementById('rbtn');
  btn.disabled = true;
  clearInterval(cdTimer);
  document.getElementById('cd').textContent = '';
  ASSETS.forEach(a => a.rows.forEach(r => setLd(a.id, r.key)));
  document.getElementById('ts').textContent = 'Fetching…';

  const [eraR, fwzR, metR, cbR, brR, wtiR] = await Promise.allSettled([
    fetchERA(),
    fetchFawaz(),
    fetchMetals(),
    fetchCoinbase(),
    fetchYahoo('BZ=F', 'crude', 'brent'),
    fetchYahoo('CL=F', 'crude', 'wti'),
  ]);

  if (eraR.status === 'rejected') { setEr('usd','era','Error'); setEr('sar','era','Error'); }
  if (fwzR.status === 'rejected') { setEr('usd','fawaz','Error'); setEr('sar','fawaz','Error'); }
  if (metR.status === 'rejected')  setEr('gold',  'metals',   'Unavailable');
  if (cbR.status  === 'rejected')  setEr('gold',  'coinbase', 'Unavailable');
  if (brR.status  === 'rejected')  setEr('crude', 'brent',    'Unavailable');
  if (wtiR.status === 'rejected')  setEr('crude', 'wti',      'Unavailable');

  const now = new Date();
  document.getElementById('ts').textContent =
    'Updated ' + now.toLocaleString('en-US', {
      day: '2-digit', month: 'short',
      hour: '2-digit', minute: '2-digit', hour12: false,
    });

  btn.disabled = false;
  startCd();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('rbtn').addEventListener('click', () => {
  clearInterval(autoTimer);
  refresh();
  autoTimer = setInterval(refresh, IV);
});

autoTimer = setInterval(refresh, IV);
refresh();
</script>

</body>
</html>
